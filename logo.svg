<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#0D3D22"/>
    </linearGradient>
    <linearGradient id="zizGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#F0B429"/>
      <stop offset="100%" style="stop-color:#C8860A"/>
    </linearGradient>
    <filter id="glowZiz" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Halo vert derrière ZiZ -->
  <ellipse cx="256" cy="300" rx="160" ry="100" fill="#1A7A42" opacity="0.20" filter="url(#glowGreen)"/>

  <!-- Lignes déco haut -->
  <line x1="60" y1="95" x2="452" y2="95" stroke="#27AE60" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="103" x2="432" y2="103" stroke="#27AE60" stroke-width="1" opacity="0.25"/>

  <!-- Lignes déco bas -->
  <line x1="60" y1="415" x2="452" y2="415" stroke="#1A7A42" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="407" x2="432" y2="407" stroke="#1A7A42" stroke-width="1" opacity="0.25"/>

  <!-- Carrés coins haut -->
  <rect x="55" y="58" width="18" height="18" rx="3" fill="#27AE60" opacity="0.8"/>
  <rect x="439" y="58" width="18" height="18" rx="3" fill="#27AE60" opacity="0.8"/>
  <!-- Carrés coins bas -->
  <rect x="55" y="436" width="18" height="18" rx="3" fill="#E74C3C" opacity="0.7"/>
  <rect x="439" y="436" width="18" height="18" rx="3" fill="#E74C3C" opacity="0.7"/>

  <!-- Petits tirets décoratifs -->
  <rect x="55" y="80" width="8" height="3" rx="1" fill="#27AE60" opacity="0.5"/>
  <rect x="449" y="80" width="8" height="3" rx="1" fill="#27AE60" opacity="0.5"/>
  <rect x="55" y="430" width="8" height="3" rx="1" fill="#E74C3C" opacity="0.5"/>
  <rect x="449" y="430" width="8" height="3" rx="1" fill="#E74C3C" opacity="0.5"/>

  <!-- DOUAE rouge néon -->
  <text x="256" y="172"
    font-family="Arial, sans-serif"
    font-size="72" font-weight="900"
    fill="#FF2D2D"
    text-anchor="middle"
    letter-spacing="16"
    filter="url(#glowRed)">DOUAE</text>

  <!-- Ligne fine sous DOUAE -->
  <line x1="110" y1="192" x2="402" y2="192" stroke="#E74C3C" stroke-width="1.5" opacity="0.6"/>

  <!-- ZiZ doré lumineux -->
  <text x="256" y="370"
    font-family="Arial Black, sans-serif"
    font-size="210" font-weight="900"
    fill="url(#zizGrad)"
    text-anchor="middle"
    filter="url(#glowZiz)">ZiZ</text>

  <!-- STATION vert tech -->
  <text x="256" y="462"
    font-family="Arial, sans-serif"
    font-size="34" font-weight="700"
    fill="#27AE60"
    text-anchor="middle"
    letter-spacing="18"
    opacity="0.9">STATION</text>
</svg>
